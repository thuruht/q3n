name = "q3n-site"
compatibility_date = "2024-12-18"
compatibility_flags = ["nodejs_compat"]
main = "src/worker.ts"
assets = { directory = "./dist/client" }

# R2 bucket for hosting package files (.deb, .tar.gz, .AppImage, etc.)
[[r2_buckets]]
binding = "PACKAGES"
bucket_name = "q3n-packages"

# Rate limiting: 30 downloads per minute per IP
[[unsafe.bindings]]
name = "RATE_LIMITER"
type = "ratelimit"
namespace_id = "1001"
simple = { limit = 30, period = 60 }
