name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.9", "3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install flake8 pytest
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Lint with flake8
        run: |
          flake8 core/ tools/ tests/ --count --select=E9,F63,F7,F82 --show-source --statistics
          flake8 core/ tools/ tests/ --count --exit-zero --max-complexity=10 --max-line-length=100 --statistics

      - name: Test with pytest
        run: |
          pytest tests/ -v --tb=short

      - name: Verify CLI help
        run: |
          python tools/q3n --help
          python tools/q3n fortune --help

      - name: Verify CLI help
        run: |
          python tools/q3n --help
          python tools/q3n fortune --help

      - name: Test fortune shell scripts
        run: |
          bash -n scripts/fortune-q3n.sh
          bash -n scripts/q3n-strfile.sh
          echo "Shell scripts syntax OK"

      - name: Build Debian package
        run: |
          dpkg-buildpackage -us -uc -b 2>/dev/null || echo "dpkg-dev not available, skipping"

  build-vscode:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate VS Code extension
        run: |
          python -c "import json; json.load(open('vscode-extension/package.json'))"
          echo "VS Code extension JSON is valid"

  docs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check README and docs exist
        run: |
          for f in README.md BUILDING.md ARCHITECTURE.md; do
            test -f "$f" && echo "✓ $f exists" || echo "✗ $f missing"
          done

  javascript:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Run Q3N JS parser tests
        run: |
          node src/js/test-q3n-parser.js
